server:
  port: 8085

spring:
  application:
    name: engagement-service
  profiles:
    active: local

  datasource:
    # Database Configuration (H2 in-memory database by default for local testing)
    url: jdbc:h2:mem:engagementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Uncomment and configure these for MySQL database connection
