apiVersion: apps/v1
kind: Deployment

metadata:
  name: engagement-service
  namespace: revhive

spec:
  replicas: 1

  selector:
    matchLabels:
      app: engagement-service

  template:
    metadata:
      labels:
        app: engagement-service

    spec:
      containers:
        - name: engagement-service
          image: tanushreenik/engagement-service:latest

          ports:
            - containerPort: 8085

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-db:3306/revhive_db
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: 23@Tanushree
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://service-registry:8761/eureka

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 5
